# Evolution API (WhatsApp Web / Baileys) para desenvolvimento local do CyberAlerta.
# NÃO é produção. Canal não-oficial: risco de bloqueio do número.
#
# Subir:   docker compose -f docker-compose.evolution.yml up -d
# Logs:    docker compose -f docker-compose.evolution.yml logs -f evolution-api
# Parar:   docker compose -f docker-compose.evolution.yml down
# Zerar:   docker compose -f docker-compose.evolution.yml down -v   (apaga a sessão pareada)
#
# Depois de subir, defina no backend/.env:  EVOLUTION_API_KEY=guardian-local-key

services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7   # imagem oficial (hub.docker.com/r/evoapicloud/evolution-api/tags)
    container_name: cyberalerta-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: guardian-local-key
      # Banco (Postgres) — persiste a sessão pareada entre restarts
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: cyberalerta
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      # Cache (Redis)
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: cyberalerta-evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cyberalerta-evolution-redis
    restart: unless-stopped

volumes:
  evolution_pgdata:
